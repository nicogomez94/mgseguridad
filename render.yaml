# render.yaml — KOS CAP static site (free tier)
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: mg-seguridad
    env: static
    buildCommand: ""          # no build step needed — pure HTML/CSS/JS
    staticPublishPath: .      # serve from repo root
    pullRequestPreviewsEnabled: false

    # Redirect all paths to index.html (SPA-style fallback)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # Security / performance headers
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=()"
      - path: /styles.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /script.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
